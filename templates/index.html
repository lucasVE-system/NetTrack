<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #070b12;
            --surface:  #0c1220;
            --surface2: #111a2e;
            --border:   #1a2840;
            --accent:   #00d4ff;
            --accent2:  #00ff9d;
            --warn:     #ffc800;
            --danger:   #ff4560;
            --text:     #8aaabb;
            --text-dim: #2a4055;
            --bright:   #d8eef8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 52px; min-height: 52px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 1.5rem; gap: 1.5rem;
            background: rgba(12,18,32,0.95);
            backdrop-filter: blur(12px);
            z-index: 200;
        }

        .logo {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem; color: var(--accent);
            letter-spacing: 3px;
            display: flex; align-items: center; gap: 0.6rem;
        }

        .logo-dot {
            width: 8px; height: 8px;
            background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: blink 2.4s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .header-stats { display: flex; gap: 1.5rem; margin-left: auto; }

        .stat {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem; color: var(--text-dim); letter-spacing: 1px;
        }
        .stat span { color: var(--accent2); }
        .stat span.warn { color: var(--warn); }

        .btn-rescan {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem; letter-spacing: 2px;
            padding: 0.35rem 0.9rem;
            background: transparent; border: 1px solid var(--accent2);
            color: var(--accent2); cursor: pointer; border-radius: 2px;
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn-rescan:hover { background: var(--accent2); color: var(--bg); }
        .btn-rescan:disabled { opacity: 0.3; cursor: not-allowed; }

        #mapWrap { flex: 1; position: relative; overflow: hidden; }

        #mapCanvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        #scanOverlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1.2rem;
            background: rgba(7,11,18,0.92); z-index: 50;
        }

        .scan-ring {
            width: 72px; height: 72px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .scan-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem; letter-spacing: 3px; color: var(--accent);
        }
        .scan-sub {
            font-size: 0.72rem; color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
        }

        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer; z-index: 10;
            user-select: none;
        }

        .node-body {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            transition: transform 0.15s;
        }
        .node:hover .node-body { transform: scale(1.1); }

        .node-icon {
            width: 54px; height: 54px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: var(--surface2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }

        .node.selected .node-icon,
        .node:hover .node-icon {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,212,255,0.3), 0 4px 16px rgba(0,0,0,0.4);
            background: rgba(0,212,255,0.08);
        }

        .node.randomized .node-icon { border-color: rgba(255,200,0,0.4); }
        .node.randomized:hover .node-icon,
        .node.randomized.selected .node-icon {
            border-color: var(--warn);
            box-shadow: 0 0 20px rgba(255,200,0,0.25), 0 4px 16px rgba(0,0,0,0.4);
            background: rgba(255,200,0,0.06);
        }

        .node-ping {
            position: absolute; top: -3px; right: -3px;
            width: 9px; height: 9px; border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 6px var(--accent2);
            border: 1.5px solid var(--bg);
        }
        .node-ping.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }

        .node-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.62rem; color: var(--bright);
            text-align: center; max-width: 88px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .node-ip {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.58rem; color: var(--accent);
        }
        .node-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.55rem; letter-spacing: 1px;
            padding: 0.1rem 0.4rem; border-radius: 2px;
            background: rgba(255,200,0,0.12); color: var(--warn);
            border: 1px solid rgba(255,200,0,0.25);
        }

        /* ── EDIT PANEL ── */
        #editPanel {
            position: absolute; top: 0; right: 0;
            width: 320px; height: 100%;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
            display: flex; flex-direction: column;
        }
        #editPanel.open { transform: translateX(0); }

        .panel-header {
            padding: 1rem 1rem 0.8rem;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            justify-content: space-between; min-height: 48px;
        }
        .panel-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem; letter-spacing: 3px;
            color: var(--text-dim); text-transform: uppercase;
        }
        .btn-close {
            background: transparent; border: none;
            color: var(--text-dim); font-size: 1rem;
            cursor: pointer; font-family: 'Share Tech Mono', monospace;
            transition: color 0.2s; line-height: 1; padding: 0.2rem;
        }
        .btn-close:hover { color: var(--danger); }

        .panel-body { padding: 1rem; flex: 1; overflow-y: auto; }

        .device-header {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1rem; padding-bottom: 0.9rem;
            border-bottom: 1px solid var(--border);
        }
        .device-icon-lg {
            font-size: 1.8rem; width: 52px; height: 52px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 8px; display: flex; align-items: center;
            justify-content: center; flex-shrink: 0;
        }
        .device-meta-ip {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem; color: var(--accent);
        }
        .device-meta-vendor {
            font-size: 0.75rem; color: var(--text-dim);
            margin-top: 0.15rem; font-family: 'Share Tech Mono', monospace;
        }
        .device-meta-warn {
            display: inline-block; margin-top: 0.3rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem; letter-spacing: 1px;
            padding: 0.15rem 0.5rem; border-radius: 2px;
            background: rgba(255,200,0,0.1); color: var(--warn);
            border: 1px solid rgba(255,200,0,0.3);
        }

        .form-group { margin-bottom: 0.8rem; }

        label {
            display: block; font-size: 0.62rem; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text-dim);
            margin-bottom: 0.3rem; font-family: 'Share Tech Mono', monospace;
        }

        input, select, textarea {
            width: 100%; background: var(--surface2);
            border: 1px solid var(--border); color: var(--bright);
            padding: 0.5rem 0.65rem;
            font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            border-radius: 3px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0,212,255,0.08);
        }
        select option { background: var(--surface2); }
        textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }

        .panel-footer {
            padding: 0.8rem 1rem; border-top: 1px solid var(--border);
            display: flex; gap: 0.5rem;
        }
        .btn-save {
            flex: 1; padding: 0.6rem; background: transparent;
            border: 1px solid var(--accent); color: var(--accent);
            font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; border-radius: 3px;
        }
        .btn-save:hover { background: var(--accent); color: var(--bg); }
        .btn-del {
            padding: 0.6rem 0.8rem; background: transparent;
            border: 1px solid rgba(255,69,96,0.35); color: var(--danger);
            font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
            cursor: pointer; transition: all 0.2s; border-radius: 3px;
        }
        .btn-del:hover { background: var(--danger); color: white; }

        #toast {
            position: fixed; bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--surface2); border: 1px solid var(--accent2);
            color: var(--accent2); font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem; letter-spacing: 2px;
            padding: 0.5rem 1.2rem; border-radius: 3px;
            opacity: 0; transition: all 0.25s; z-index: 999; pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #emptyState {
            position: absolute; inset: 0; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 0.6rem; color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem; letter-spacing: 2px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-dot"></div>NETTRACK</div>
    <div class="header-stats">
        <div class="stat">SUBNET <span id="hSubnet">—</span></div>
        <div class="stat">DEVICES <span id="hCount">—</span></div>
        <div class="stat">RANDOMIZED <span class="warn" id="hRandom">—</span></div>
    </div>
    <button class="btn-rescan" id="rescanBtn" onclick="runScan()">⟳ Rescan</button>
</header>

<div id="mapWrap">
    <canvas id="mapCanvas"></canvas>

    <div id="scanOverlay">
        <div class="scan-ring"></div>
        <div class="scan-label">Scanning Network</div>
        <div class="scan-sub">ARP + ping sweep in progress...</div>
    </div>

    <div id="emptyState">
        <div>[ NO DEVICES FOUND ]</div>
        <div style="font-size:0.65rem">Try rescanning</div>
    </div>

    <div id="editPanel">
        <div class="panel-header">
            <div class="panel-title">Device Details</div>
            <button class="btn-close" onclick="closePanel()">✕</button>
        </div>
        <div class="panel-body">
            <div class="device-header">
                <div class="device-icon-lg" id="p-icon">📡</div>
                <div>
                    <div class="device-meta-ip" id="p-ip-display">—</div>
                    <div class="device-meta-vendor" id="p-vendor-display">—</div>
                    <div class="device-meta-warn" id="p-rand-badge" style="display:none">
                        ⚠ RANDOMIZED MAC — ENDPOINT
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Device Name</label>
                <input type="text" id="p-name" placeholder="SW1, R-Core, AP-Floor2...">
            </div>
            <div class="form-group">
                <label>Device Type</label>
                <select id="p-type" onchange="updateNodeIcon()">
                    <option value="router">Router</option>
                    <option value="switch">Switch</option>
                    <option value="ap">Access Point</option>
                    <option value="firewall">Firewall</option>
                    <option value="server">Server</option>
                    <option value="pc">PC / Desktop</option>
                    <option value="laptop">Laptop</option>
                    <option value="phone">Phone / Tablet</option>
                    <option value="iot">IoT / Smart Device</option>
                    <option value="printer">Printer</option>
                    <option value="nas">NAS / Storage</option>
                    <option value="camera">Camera</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>IP Address</label>
                    <input type="text" id="p-ip">
                </div>
                <div class="form-group">
                    <label>MAC Address</label>
                    <input type="text" id="p-mac" readonly style="opacity:0.5;cursor:not-allowed">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="p-vendor">
                </div>
                <div class="form-group">
                    <label>Room / Location</label>
                    <input type="text" id="p-room" placeholder="Server Room A">
                </div>
            </div>
            <div class="form-group">
                <label>Config Notes</label>
                <textarea id="p-notes" placeholder="VLANs, interfaces, routing config..."></textarea>
            </div>
        </div>
        <div class="panel-footer">
            <button class="btn-save" onclick="saveDevice()">Save Changes</button>
            <button class="btn-del"  onclick="deleteDevice()">Delete</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
let devices     = [];
let nodes       = [];
let selectedIdx = null;
let dragNode    = null;
let dragOffX    = 0, dragOffY = 0;
let dragMoved   = false;

const ICONS = {
    router:   '🌐',
    switch:   '🔀',
    ap:       '📶',
    firewall: '🛡️',
    server:   '🖥️',
    pc:       '🖥️',
    laptop:   '💻',
    phone:    '📱',
    iot:      '💡',
    printer:  '🖨️',
    nas:      '💾',
    camera:   '📷',
    other:    '📡'
};

// ── MAC UTILS ─────────────────────────────────────────────
function isMacRandomized(mac) {
    if (!mac) return false;
    try {
        const first = parseInt(mac.replace(/[^0-9a-fA-F]/g, '').substring(0, 2), 16);
        return !!(first & 0x02);
    } catch { return false; }
}

function isNoiseDevice(device) {
    // Filter out multicast, broadcast, and VMware virtual adapters
    const ip  = device.ip  || '';
    const mac = device.mac || '';
    if (ip.startsWith('224.') || ip.startsWith('239.')) return true;
    if (ip.endsWith('.255')) return true;
    if (mac === 'FF:FF:FF:FF:FF:FF') return true;
    if (mac.startsWith('01:00:5E')) return true; // IPv4 multicast
    return false;
}

// ── CANVAS ────────────────────────────────────────────────
const canvas = document.getElementById('mapCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    drawLines();
}

function drawLines() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (nodes.length < 2) return;
    const gw = nodes.find(n => n.device.ip && n.device.ip.endsWith('.1')) || nodes[0];
    nodes.forEach(n => {
        if (n === gw) return;
        const isSelected = selectedIdx !== null &&
            (nodes[selectedIdx] === n || nodes[selectedIdx] === gw);
        ctx.beginPath();
        ctx.moveTo(gw.x, gw.y);
        ctx.lineTo(n.x, n.y);
        ctx.strokeStyle = isSelected
            ? (n.device.randomized ? 'rgba(255,200,0,0.4)' : 'rgba(0,212,255,0.4)')
            : 'rgba(26,40,64,0.8)';
        ctx.lineWidth   = isSelected ? 2 : 1.5;
        ctx.setLineDash([4, 7]);
        ctx.stroke();
        ctx.setLineDash([]);
    });
}

// ── NODES ─────────────────────────────────────────────────
function createNode(device, x, y, index) {
    const wrap       = document.getElementById('mapWrap');
    const randomized = isMacRandomized(device.mac);
    const el         = document.createElement('div');
    el.className     = 'node' + (randomized ? ' randomized' : '');
    el.style.left    = x + 'px';
    el.style.top     = y + 'px';
    el.dataset.index = index;

    const pingClass = randomized ? 'node-ping warn' : 'node-ping';
    const label     = device.name || device.hostname || (randomized ? 'endpoint' : '—');

    el.innerHTML = `
        <div class="node-body">
            <div class="node-icon">
                ${ICONS[device.type] || '📡'}
                <div class="${pingClass}"></div>
            </div>
            <div class="node-label">${label}</div>
            <div class="node-ip">${device.ip || ''}</div>
            ${randomized ? '<div class="node-badge">ENDPOINT</div>' : ''}
        </div>`;

    el.addEventListener('mousedown', e => {
        dragNode  = { index, el };
        dragMoved = false;
        const rect     = el.getBoundingClientRect();
        const wrapRect = wrap.getBoundingClientRect();
        dragOffX = e.clientX - (rect.left + rect.width / 2  - wrapRect.left);
        dragOffY = e.clientY - (rect.top  + rect.height / 2 - wrapRect.top);
        e.stopPropagation();
        e.preventDefault();
    });

    wrap.appendChild(el);
    return el;
}

document.getElementById('mapWrap').addEventListener('mousemove', e => {
    if (!dragNode) return;
    dragMoved = true;
    const wrapRect = document.getElementById('mapWrap').getBoundingClientRect();
    const x = e.clientX - wrapRect.left - dragOffX;
    const y = e.clientY - wrapRect.top  - dragOffY;
    dragNode.el.style.left    = x + 'px';
    dragNode.el.style.top     = y + 'px';
    nodes[dragNode.index].x   = x;
    nodes[dragNode.index].y   = y;
    drawLines();
});

document.getElementById('mapWrap').addEventListener('mouseup', () => {
    if (!dragNode) return;
    if (!dragMoved) selectNode(dragNode.index);
    dragNode  = null;
    dragMoved = false;
});

document.getElementById('mapWrap').addEventListener('mousedown', e => {
    if (e.target === canvas || e.target === document.getElementById('mapWrap')) {
        closePanel();
    }
});

function layoutNodes(list) {
    const wrap = document.getElementById('mapWrap');
    const W = wrap.offsetWidth, H = wrap.offsetHeight;
    const cx = W / 2, cy = H / 2;
    const r  = Math.min(W, H) * 0.30;
    nodes    = [];

    list.forEach((device, i) => {
        const isGW = device.ip && device.ip.endsWith('.1');
        let x, y;
        if (isGW) {
            x = cx; y = cy;
        } else {
            const nonGW = list.filter(d => !(d.ip && d.ip.endsWith('.1')));
            const ni    = nonGW.indexOf(device);
            const angle = (ni / nonGW.length) * Math.PI * 2 - Math.PI / 2;
            x = cx + r * Math.cos(angle);
            y = cy + r * Math.sin(angle);
        }
        const el = createNode(device, x, y, i);
        nodes.push({ device, x, y, el });
    });

    drawLines();
}

// ── PANEL ─────────────────────────────────────────────────
function selectNode(index) {
    if (selectedIdx !== null && nodes[selectedIdx]) {
        nodes[selectedIdx].el.classList.remove('selected');
    }
    selectedIdx = index;
    nodes[index].el.classList.add('selected');
    drawLines();

    const d          = nodes[index].device;
    const randomized = isMacRandomized(d.mac);

    document.getElementById('p-icon').textContent           = ICONS[d.type] || '📡';
    document.getElementById('p-ip-display').textContent     = d.ip || '—';
    document.getElementById('p-vendor-display').textContent = randomized
        ? 'Randomized MAC address'
        : (d.vendor || d.hostname || 'Unknown vendor');
    document.getElementById('p-rand-badge').style.display   = randomized ? 'inline-block' : 'none';
    document.getElementById('p-name').value   = d.name   || d.hostname || '';
    document.getElementById('p-type').value   = d.type   || 'other';
    document.getElementById('p-ip').value     = d.ip     || '';
    document.getElementById('p-mac').value    = d.mac    || '';
    document.getElementById('p-vendor').value = d.vendor || '';
    document.getElementById('p-room').value   = d.room   || '';
    document.getElementById('p-notes').value  = d.notes  || '';
    document.getElementById('editPanel').classList.add('open');
}

function closePanel() {
    document.getElementById('editPanel').classList.remove('open');
    if (selectedIdx !== null && nodes[selectedIdx]) {
        nodes[selectedIdx].el.classList.remove('selected');
    }
    selectedIdx = null;
    drawLines();
}

function updateNodeIcon() {
    if (selectedIdx === null) return;
    const type      = document.getElementById('p-type').value;
    const randomized = isMacRandomized(nodes[selectedIdx].device.mac);
    const pingClass = randomized ? 'node-ping warn' : 'node-ping';
    const iconEl    = nodes[selectedIdx].el.querySelector('.node-icon');
    iconEl.innerHTML = (ICONS[type] || '📡') + `<div class="${pingClass}"></div>`;
    document.getElementById('p-icon').textContent = ICONS[type] || '📡';
}

// ── SAVE / DELETE ─────────────────────────────────────────
async function saveDevice() {
    if (selectedIdx === null) return;
    const updated = {
        ...nodes[selectedIdx].device,
        name:   document.getElementById('p-name').value,
        type:   document.getElementById('p-type').value,
        ip:     document.getElementById('p-ip').value,
        mac:    document.getElementById('p-mac').value,
        vendor: document.getElementById('p-vendor').value,
        room:   document.getElementById('p-room').value,
        notes:  document.getElementById('p-notes').value,
    };

    const res = await fetch('/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mac: updated.mac || null, device: updated })
    });

    if (res.ok) {
        devices[selectedIdx]      = updated;
        nodes[selectedIdx].device = updated;
        nodes[selectedIdx].el.querySelector('.node-label').textContent =
            updated.name || updated.hostname || '—';
        nodes[selectedIdx].el.querySelector('.node-ip').textContent = updated.ip;
        updateNodeIcon();
        toast('✓ Saved');
    } else {
        toast('✗ Save failed');
    }
}

async function deleteDevice() {
    if (selectedIdx === null) return;
    const d = nodes[selectedIdx].device;
    if (!confirm(`Remove ${d.ip} from inventory?`)) return;

    const res = await fetch('/delete-device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mac: d.mac || null, ip: d.ip })
    });

    if (!res.ok) {
        toast('✗ Delete failed');
        return;
    }

    nodes[selectedIdx].el.remove();
    devices.splice(selectedIdx, 1);
    nodes.splice(selectedIdx, 1);
    nodes.forEach((n, i) => { n.el.dataset.index = i; });
    document.getElementById('hCount').textContent = devices.length;
    closePanel();
    drawLines();
    toast('Removed');
}

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── SCAN ──────────────────────────────────────────────────
async function runScan() {
    const overlay = document.getElementById('scanOverlay');
    const btn     = document.getElementById('rescanBtn');

    overlay.style.display = 'flex';
    btn.disabled = true;
    nodes.forEach(n => n.el.remove());
    nodes = [];
    closePanel();

    const [scanRes, savedRes] = await Promise.all([fetch('/scan'), fetch('/devices')]);
    const scanData  = await scanRes.json();
    const savedData = await savedRes.json();

    // Filter out noise (multicast, VMware, broadcast)
    const cleanDevices = scanData.devices.filter(d => !isNoiseDevice(d));

    // Re-derive randomized flag on frontend from MAC
    const tagged = cleanDevices.map(d => ({
        ...d,
        randomized: isMacRandomized(d.mac)
    }));

    document.getElementById('hSubnet').textContent  = scanData.subnet + '.0/24';
    document.getElementById('hCount').textContent   = tagged.length;
    document.getElementById('hRandom').textContent  = tagged.filter(d => d.randomized).length;

    // Merge with saved data — MAC is primary key, IP is fallback
    devices = tagged.map(scanned => {
        const saved = savedData.find(s =>
            (scanned.mac && s.mac === scanned.mac) ||
            (!scanned.mac && s.ip === scanned.ip)
        );
        return saved
            ? { ...scanned, ...saved, ip: scanned.ip, randomized: scanned.randomized }
            : { ...scanned, type: 'other', name: '', room: '', notes: '' };
    });

    if (devices.length === 0) {
        document.getElementById('emptyState').style.display = 'flex';
    } else {
        document.getElementById('emptyState').style.display = 'none';
        layoutNodes(devices);
    }

    await fetch('/save-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(devices)
    });

    overlay.style.display = 'none';
    btn.disabled = false;
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('load',   () => { resizeCanvas(); runScan(); });
</script>
